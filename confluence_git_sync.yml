- name: Full Git → Confluence Sync (Create + Update)
  hosts: localhost
  gather_facts: no

  vars:
    git_repo: "https://github.com/Allan111281/Git-Jenkins-Ansible.git"
    repo_dest: "/tmp/repo"

    confluence_base_url: "https://confluence.umit.dk"
    confluence_space_key: "SASDOK"
    parent_page_id: "231933858"

  vars_prompt:
    - name: confluence_user
      prompt: "Confluence email (same user as API token)"
      private: no

    - name: confluence_password
      prompt: "Confluence API token"
      private: yes

  tasks:

    ########################################################
    # CLEAN + CLONE
    ########################################################

    - name: Clean workspace
      file:
        path: "{{ repo_dest }}"
        state: absent

    - name: Clone Git repository
      git:
        repo: "{{ git_repo }}"
        dest: "{{ repo_dest }}"
        version: main
        force: yes

    ########################################################
    # FIND MARKDOWN FILES
    ########################################################

    - name: Find markdown files
      find:
        paths: "{{ repo_dest }}"
        patterns: "*.md"
      register: md_files

    ########################################################
    # CHECK EXISTING PAGES
    ########################################################

    - name: Check if page exists
      uri:
        url: "{{ confluence_base_url }}/rest/api/content?title={{ item.path | basename | regex_replace('.md','') }}&spaceKey={{ confluence_space_key }}&expand=version"
        method: GET
        user: "{{ confluence_user }}"
        password: "{{ confluence_password }}"
        force_basic_auth: yes
        headers:
          Accept: "application/json"
        return_content: yes
        status_code: 200
      register: page_check
      loop: "{{ md_files.files }}"
      loop_control:
        label: "{{ item.path | basename }}"

    ########################################################
    # READ FILE CONTENT
    ########################################################

    - name: Read markdown files
      slurp:
        src: "{{ item.path }}"
      register: md_content
      loop: "{{ md_files.files }}"
      loop_control:
        label: "{{ item.path | basename }}"

    ########################################################
    # CREATE OR UPDATE PAGES
    ########################################################

    - name: Sync pages to Confluence
      uri:
        url: >-
          {{
            confluence_base_url +
            (
              '/rest/api/content/' + page_check.results[ansible_loop.index0].json.results[0].id
              if page_check.results[ansible_loop.index0].json.size|int > 0
              else '/rest/api/content'
            )
          }}
        method: >-
          {{
            'PUT'
            if page_check.results[ansible_loop.index0].json.size|int > 0
            else 'POST'
          }}
        user: "{{ confluence_user }}"
        password: "{{ confluence_password }}"
        force_basic_auth: yes

        headers:
          Content-Type: "application/json"
          Accept: "application/json"

        body_format: json

        body:
          id: >-
            {{
              page_check.results[ansible_loop.index0].json.results[0].id
              if page_check.results[ansible_loop.index0].json.size|int > 0
              else omit
            }}

          type: page

          title: "{{ item.item.path | basename | regex_replace('.md','') }}"

          version: >-
            {{
              {
                'number':
                (
                  page_check.results[ansible_loop.index0].json.results[0].version.number | int + 1
                )
              }
              if page_check.results[ansible_loop.index0].json.size|int > 0
              else omit
            }}

          space:
            key: "{{ confluence_space_key }}"

          ancestors:
            - id: "{{ parent_page_id }}"

          body:
            storage:
              representation: storage
              value: |
                <div style="background:#e3f2fd;
                            border:1px solid #90caf9;
                            padding:16px;
                            border-radius:8px;
                            margin-bottom:20px;">

                  <h2>⚡ Automatisk genereret fra Git via Ansible</h2>

                  <p>
                    Denne side er genereret automatisk fra Git markdown filer.
                  </p>

                  <p>
                    🔁 <b>OBS:</b> Denne side kan blive overskrevet ved næste deployment.
                  </p>

                  <p>
                    ✏️ Ændringer skal laves i Git repository – ikke i Confluence.
                  </p>

                </div>

                <h1>{{ item.item.path | basename | regex_replace('.md','') }}</h1>

                <hr/>

                <ac:structured-macro ac:name="info">
                  <ac:rich-text-body>
                    <p><b>Source:</b> Git Repository</p>
                    <p><b>Pipeline:</b> Ansible Automation</p>
                  </ac:rich-text-body>
                </ac:structured-macro>

                <br/>

                <ac:structured-macro ac:name="code">
                  <ac:parameter ac:name="language">markdown</ac:parameter>
                  <ac:plain-text-body><![CDATA[{{ item.content | b64decode }}]]></ac:plain-text-body>
                </ac:structured-macro>

      loop: "{{ md_content.results }}"
      loop_control:
        label: "{{ item.item.path | basename }}"
        extended: yes

    ########################################################
    # CLEANUP
    ########################################################

    - name: Cleanup workspace
      file:
        path: "{{ repo_dest }}"
        state: absent
