---
- name: Export certificates from KeePassXC (Playbook 1 - Real Working Version)
  hosts: windows
  gather_facts: false

  vars_prompt:
    - name: kp_master_pass
      prompt: "Indtast KeePass password"
      private: true

  tasks:

    #################################################
    # FOLDERS
    #################################################

    - name: Ensure certificates folder exists
      ansible.windows.win_file:
        path: C:\temp\certificates
        state: directory

    - name: Ensure 3DES folder exists
      ansible.windows.win_file:
        path: C:\temp\certificates\3des
        state: directory

    #################################################
    # SAVE MASTER PASSWORD TEMP
    #################################################

    - name: Save KeePass password temp file
      ansible.windows.win_copy:
        content: "{{ kp_master_pass }}"
        dest: C:\temp\kp_pass.txt

    #################################################
    # GET ENTRIES
    #################################################

    - name: Get KeePass entries
      ansible.windows.win_shell: |
        $kpPass = Get-Content "C:\temp\kp_pass.txt"

        $kpPass | & "C:\Program Files\KeePassXC\keepassxc-cli.exe" ls `
          "C:\Users\alchr\AdgangsKoder.kdbx" `
          "Certificates"
      register: cert_list
      no_log: true

    - name: Clean entry list
      set_fact:
        cert_entries: "{{ cert_list.stdout_lines | reject('equalto','') | list }}"

    #################################################
    # EXPORT ATTACHMENTS + PASSWORDS
    #################################################

    - name: Process each certificate entry
      ansible.windows.win_shell: |
        $entry = "{{ item }}"
        $kpPass = Get-Content "C:\temp\kp_pass.txt"

        #################################################
        # GET ATTACHMENTS
        #################################################

        $attachmentOutput = $kpPass | & "C:\Program Files\KeePassXC\keepassxc-cli.exe" show `
          --show-attachments `
          "C:\Users\alchr\AdgangsKoder.kdbx" `
          $entry

        $attachments = @()

        foreach ($line in $attachmentOutput) {
          if ($line -match '^\s+(.+\.(pfx|p12))\s+\(') {
            $attachments += $matches[1]
          }
        }

        #################################################
        # EXPORT FILES
        #################################################

        foreach ($file in $attachments) {
          $destination = "C:\temp\certificates\$file"

          $kpPass | & "C:\Program Files\KeePassXC\keepassxc-cli.exe" attachment-export `
            "C:\Users\alchr\AdgangsKoder.kdbx" `
            $entry `
            $file `
            $destination
        }

        #################################################
        # GET PASSWORD
        #################################################

        $password = $kpPass | & "C:\Program Files\KeePassXC\keepassxc-cli.exe" show `
          --show-protected `
          -a password `
          "C:\Users\alchr\AdgangsKoder.kdbx" `
          $entry

        #################################################
        # SAVE PASSWORD FILE
        #################################################

        Add-Content `
          -Path "C:\temp\certificates\passwords.txt" `
          -Value "$entry : $password"

      loop: "{{ cert_entries }}"
      no_log: true

    #################################################
    # CLEANUP
    #################################################

    - name: Remove KeePass password temp file
      ansible.windows.win_file:
        path: C:\temp\kp_pass.txt
        state: absent

    #################################################
    # DONE
    #################################################

    - name: Done
      debug:
        msg:
          - "Certificates exported successfully"
          - "Files saved in: C:\\temp\\certificates"
          - "Move 3DES certificates manually to:"
          - "C:\\temp\\certificates\\3des"
