- name: Sync README.md fra Git til Confluence side
  hosts: localhost
  gather_facts: no

  vars:
    git_repo: "https://github.com/Allan111281/Git-Jenkins-Ansible.git"
    repo_dest: "/tmp/repo"

    # VIGTIGT: ingen /wiki her
    confluence_base_url: "https://confluence.umit.dk"
    confluence_page_id: "231933845"

  vars_prompt:
    - name: confluence_user
      prompt: "Confluence username"
      private: no

    - name: confluence_password
      prompt: "Confluence password / API token"
      private: yes

  tasks:

    - name: Ensure clean workspace before cloning
      ansible.builtin.file:
        path: "{{ repo_dest }}"
        state: absent

    - name: Clone Git repository
      ansible.builtin.git:
        repo: "{{ git_repo }}"
        dest: "{{ repo_dest }}"
        version: main
        force: yes

    - name: Read README.md file
      ansible.builtin.slurp:
        src: "{{ repo_dest }}/README.md"
      register: readme_file

    - name: Decode README content
      ansible.builtin.set_fact:
        readme_content: "{{ readme_file.content | b64decode }}"

    - name: Get current Confluence page info (for versioning)
      ansible.builtin.uri:
        url: "{{ confluence_base_url }}/rest/api/content/{{ confluence_page_id }}?expand=version"
        method: GET
        user: "{{ confluence_user }}"
        password: "{{ confluence_password }}"
        force_basic_auth: yes
        return_content: yes
        status_code: 200
        headers:
          Accept: "application/json"
      register: page_info
      no_log: true

    - name: Set next version number
      ansible.builtin.set_fact:
        next_version: "{{ page_info.json.version.number | int + 1 }}"

    - name: Update Confluence page (README from Git)
      ansible.builtin.uri:
        url: "{{ confluence_base_url }}/rest/api/content/{{ confluence_page_id }}"
        method: PUT
        user: "{{ confluence_user }}"
        password: "{{ confluence_password }}"
        force_basic_auth: yes
        headers:
          Content-Type: "application/json"
          Accept: "application/json"
        body_format: json
        body:
          id: "{{ confluence_page_id }}"
          type: "page"
          title: "Readme.md file fra git"
          version:
            number: "{{ next_version }}"
          body:
            storage:
              value: |
                <h2 style="color:red;">⚠️ Denne side er automatisk genereret fra Git</h2>
                <p><b>Ændringer skal foretages i Git repository.</b></p>
                <hr/>
                <pre>{{ readme_content }}</pre>
              representation: "storage"
      no_log: true

    - name: Cleanup - remove cloned repository
      ansible.builtin.file:
        path: "{{ repo_dest }}"
        state: absent
