- name: Windows TSM + MSSQL install
  block:

    ########################################
    # PREP
    ########################################
    - name: Ensure temp directory exists
      win_file:
        path: C:\Temp
        state: directory

    ########################################
    # DOWNLOAD
    ########################################
    - name: Download packages
      win_get_url:
        url: "{{ item }}"
        dest: "C:\\Temp\\{{ item | basename }}"
      loop: "{{ selected_packages }}"

    ########################################
    # RUN SETUPFCM (NO ASSUMPTIONS)
    ########################################
    - name: Run setupFCM installer
      win_command:
        argv:
          - "C:\\Temp\\TSMSQL_WIN\\setupFCM\\setupFCM.exe"
      register: setupfcm_result
      failed_when: false

    ########################################
    # WAIT FOR EXTRACTION (IMPORTANT)
    ########################################
    - name: Wait for extraction to complete
      pause:
        seconds: 30

    ########################################
    # FIND SPINSTALL DYNAMICALLY
    ########################################
    - name: Locate spinstall.exe
      win_find:
        paths: C:\Temp
        patterns: spinstall.exe
        recurse: yes
      register: spinstall_search

    - name: Fail if spinstall not found
      fail:
        msg: "spinstall.exe not found after extraction"
      when: spinstall_search.matched == 0

    - name: Set spinstall path
      set_fact:
        spinstall_path: "{{ spinstall_search.files[0].path }}"

    ########################################
    # MSSQL INSTALL (CORRECT EXECUTION MODEL)
    ########################################
    - name: Run MSSQL spinstall
      win_command:
        argv:
          - "{{ spinstall_path }}"
          - "/quiet"
          - "/norestart"
      register: spinstall_result
      when: database == "mssql"

    ########################################
    # VERIFY (NOT FILE-BASED GUESSING)
    ########################################
    - name: Check MSSQL service
      win_service:
        name: MSSQLSERVER
      register: mssql_service
      ignore_errors: yes

    - name: Show result
      debug:
        msg:
          - "MSSQL exists: {{ mssql_service.exists | default(false) }}"
          - "State: {{ mssql_service.state | default('unknown') }}"

  when: ansible_os_family == "Windows"
