- name: Git → Confluence Single Page Mode
  hosts: localhost
  gather_facts: no

  vars:
    git_repo: "https://github.com/Allan111281/ansible-automation.git"
    repo_dest: "/tmp/repo"

    confluence_base_url: "https://confluence.umit.dk"
    confluence_space_key: "SASDOK"
    parent_page_id: "231933858"

  vars_prompt:
    - name: confluence_user
      prompt: "Confluence email"
      private: no

    - name: confluence_password
      prompt: "Confluence API token"
      private: yes

    - name: confluence_page_title
      prompt: "Navn på Confluence-siden (kun første gang vigtigt)"
      private: no

  tasks:

    ########################################################
    # GET OR CREATE SINGLE PAGE
    ########################################################

    - name: Check if Confluence page exists
      uri:
        url: "{{ confluence_base_url }}/rest/api/content?title={{ confluence_page_title | urlencode }}&spaceKey={{ confluence_space_key }}&expand=version,body.storage"
        method: GET
        user: "{{ confluence_user }}"
        password: "{{ confluence_password }}"
        force_basic_auth: yes
        headers:
          Accept: "application/json"
        return_content: yes
      register: existing_page

    - name: Set page state
      set_fact:
        page_exists: "{{ existing_page.json.size | int > 0 }}"

    ########################################################
    # CLONE REPO
    ########################################################

    - name: Clean workspace
      file:
        path: "{{ repo_dest }}"
        state: absent

    - name: Clone repo
      git:
        repo: "{{ git_repo }}"
        dest: "{{ repo_dest }}"
        version: main
        force: yes

    - name: Find markdown file
      find:
        paths: "{{ repo_dest }}"
        patterns: "*.md"
      register: md_files

    - name: Set markdown file
      set_fact:
        md_file: "{{ md_files.files[0].path }}"

    ########################################################
    # CONVERT MARKDOWN
    ########################################################

    - name: Convert markdown to HTML
      shell: pandoc "{{ md_file }}" -f markdown -t html
      register: html_content

    ########################################################
    # CREATE OR UPDATE SINGLE PAGE
    ########################################################

    - name: Create or update Confluence page
      uri:
        url: >-
          {{
            confluence_base_url +
            (
              '/rest/api/content/' + existing_page.json.results[0].id
              if page_exists
              else '/rest/api/content'
            )
          }}

        method: >-
          {{
            'PUT'
            if page_exists
            else 'POST'
          }}

        user: "{{ confluence_user }}"
        password: "{{ confluence_password }}"
        force_basic_auth: yes

        headers:
          Content-Type: "application/json"
          Accept: "application/json"

        body_format: json

        body:
          id: >-
            {{
              existing_page.json.results[0].id
              if page_exists
              else omit
            }}

          type: page
          title: "{{ confluence_page_title }}"

          version: >-
            {{
              {
                'number': existing_page.json.results[0].version.number | int + 1
              }
              if page_exists
              else omit
            }}

          space:
            key: "{{ confluence_space_key }}"

          ancestors:
            - id: "{{ parent_page_id }}"

          body:
            storage:
              representation: storage
              value: "{{ html_content.stdout }}"

    ########################################################
    # CLEANUP
    ########################################################

    - name: Cleanup workspace
      file:
        path: "{{ repo_dest }}"
        state: absent

    - name: Summary
      debug:
        msg: "Confluence page '{{ confluence_page_title }}' is now synced (single-page mode)"
