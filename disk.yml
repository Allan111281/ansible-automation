---
- name: Disk overview (Windows - reliable)
  hosts: windows
  gather_facts: no

  tasks:

    - name: Get disk usage from PowerShell
      win_shell: |
        $drive = Get-PSDrive C

        $used = $drive.Used
        $free = $drive.Free
        $total = $used + $free

        $percentUsed = [math]::Round(($used / $total) * 100, 2)
        $percentFree = [math]::Round(($free / $total) * 100, 2)

        [PSCustomObject]@{
          Drive = "C:"
          UsedGB = [math]::Round($used / 1GB, 2)
          FreeGB = [math]::Round($free / 1GB, 2)
          TotalGB = [math]::Round($total / 1GB, 2)
          UsedPercent = $percentUsed
          FreePercent = $percentFree
        } | ConvertTo-Json -Compress
      register: disk

    - name: Show disk usage result
      debug:
        msg: "{{ disk.stdout | from_json }}"
