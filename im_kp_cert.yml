---
- name: Deploy ALL certificates from KeePassXC (bulletproof version)
  hosts: windows
  gather_facts: false

  vars_prompt:
    - name: kp_master_pass
      prompt: "Indtast KeePass password"
      private: true

  tasks:

    # ---------------------------------------------------
    # 1. TEMP DIR
    # ---------------------------------------------------
    - name: Ensure temp directory exists
      ansible.windows.win_file:
        path: C:\temp\certificates
        state: directory

    # ---------------------------------------------------
    # 2. GET ENTRIES
    # ---------------------------------------------------
    - name: Get certificate entries
      ansible.windows.win_shell: |
        echo "{{ kp_master_pass }}" | & "C:\Program Files\KeePassXC\keepassxc-cli.exe" ls `
          "C:\Users\alchr\AdgangsKoder.kdbx" `
          "Certificates"
      register: cert_list

    - name: Clean entry list
      set_fact:
        cert_entries: "{{ cert_list.stdout_lines | reject('equalto','') | list }}"

    # ---------------------------------------------------
    # 3. GET ENTRY DETAILS
    # ---------------------------------------------------
    - name: Get entry details (attachments)
      ansible.windows.win_shell: |
        echo "{{ kp_master_pass }}" | & "C:\Program Files\KeePassXC\keepassxc-cli.exe" show `
          --show-attachments `
          "C:\Users\alchr\AdgangsKoder.kdbx" `
          "{{ item }}"
      loop: "{{ cert_entries }}"
      register: attachment_raw

    - name: Get entry passwords
      ansible.windows.win_shell: |
        echo "{{ kp_master_pass }}" | & "C:\Program Files\KeePassXC\keepassxc-cli.exe" show `
          --show-protected `
          -a password `
          "C:\Users\alchr\AdgangsKoder.kdbx" `
          "{{ item }}"
      loop: "{{ cert_entries }}"
      register: password_raw
      no_log: true

    # ---------------------------------------------------
    # 4. BUILD CERT MAP (NO JSON!)
    # ---------------------------------------------------
    - name: Build cert map
      set_fact:
        cert_map: "{{ cert_map | default([]) + [ {
          'entry': item.0.item,
          'password': (item.1.stdout | trim),
          'attachments': (
            item.0.stdout_lines
            | select('search', '^  ')
            | map('regex_replace', '^\\s+', '')
            | map('regex_replace', ' \\(.*$', '')
            | select('match', '.*\\.(pfx|p12)$')
            | list
          )
        } ] }}"
      loop: "{{ attachment_raw.results | zip(password_raw.results) | list }}"
      no_log: true

    # ---------------------------------------------------
    # 5. EXPORT
    # ---------------------------------------------------
    - name: Export certificates
      ansible.windows.win_shell: |
        $entry = "{{ item.entry }}"

        {% for file in item.attachments %}
        echo "{{ kp_master_pass }}" | & "C:\Program Files\KeePassXC\keepassxc-cli.exe" attachment-export `
          "C:\Users\alchr\AdgangsKoder.kdbx" `
          "$entry" `
          "{{ file }}" `
          "C:\temp\certificates\{{ file }}"
        {% endfor %}
      loop: "{{ cert_map }}"
      no_log: true

    # ---------------------------------------------------
    # 6. IMPORT
    # ---------------------------------------------------
    - name: Import certificates
      ansible.windows.win_shell: |
        $ErrorActionPreference = "Stop"

        {% for item in cert_map %}
        {% for file in item.attachments %}

        $file = "C:\temp\certificates\{{ file }}"
        $pwd = ConvertTo-SecureString "{{ item.password }}" -AsPlainText -Force

        Import-PfxCertificate `
          -FilePath $file `
          -CertStoreLocation "cert:\LocalMachine\My" `
          -Password $pwd

        {% endfor %}
        {% endfor %}
      no_log: true

    # ---------------------------------------------------
    # 7. VERIFY
    # ---------------------------------------------------
    - name: Verify installed certs
      ansible.windows.win_shell: |
        Get-ChildItem Cert:\LocalMachine\My |
        Where-Object { $_.HasPrivateKey } |
        Select Subject, Thumbprint

    # ---------------------------------------------------
    # 8. CLEANUP
    # ---------------------------------------------------
#    - name: Cleanup temp folder
#      ansible.windows.win_file:
#        path: C:\temp\certificates
#        state: absent
